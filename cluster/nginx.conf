upstream gateway_cluster {
    least_conn;
    server 127.0.0.1:8800 weight=5;
    server 127.0.0.1:8801 weight=5;
    server 127.0.0.1:8802 weight=5;
}

upstream worker_cluster {
    random;
    server 127.0.0.1:8900;
    server 127.0.0.1:8901;
    server 127.0.0.1:8902;
}

server {
    listen 80;
    server_name api.anchor-gateway.local;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 通用限流
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
    limit_req zone=global burst=200 nodelay;

    location / {
        proxy_pass http://gateway_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /async-audit {
        proxy_pass http://worker_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
