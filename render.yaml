# =============================================================================
# Render Blueprint — Anchor Gateway 集群
# =============================================================================
# 免费套餐: 512MB RAM + 750h/月, 自动 HTTPS, 新加坡节点
# =============================================================================

services:
  - type: web
    name: anchor-gateway
    env: python
    region: singapore
    plan: free
    buildCommand: python3 -c "import feedback_store; feedback_store.init_db(); print('[OK] feedback.db')"
    startCommand: python3 awareness_gateway.py --port $PORT --mock
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: REDIS_NODES
        value: ""
      - key: ASYNC_AUDIT
        value: "0"
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 5
    healthCheckRetries: 3
    autoDeploy: true

  - type: web
    name: anchor-dashboard
    env: python
    region: singapore
    plan: free
    startCommand: python3 feedback_dashboard.py --port $PORT
    healthCheckPath: /
    autoDeploy: false

  - type: worker
    name: anchor-audit-worker
    env: python
    region: singapore
    plan: free
    buildCommand: pip install redis 2>/dev/null || true
    startCommand: python3 cluster/audit_worker.py
    envVars:
      - key: REDIS_NODES
        value: ""
    autoDeploy: false
