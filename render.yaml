# =============================================================================
# Render Blueprint — Anchor Gateway
# =============================================================================
# 免费套餐: 512MB RAM + 750h/月, 自动 HTTPS, 新加坡节点
# 内置 fakeredis 自动降级, 无需外部 Redis
# =============================================================================

services:
  - type: web
    name: anchor-gateway
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install fakeredis 2>/dev/null || true
      python3 -c "import feedback_store; feedback_store.init_db(); print('[OK]')"
    startCommand: python3 awareness_gateway.py --port $PORT --mock
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ASYNC_AUDIT
        value: "1"
    healthCheckPath: /health
    autoDeploy: true
