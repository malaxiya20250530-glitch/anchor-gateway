# =============================================================================
# Render Blueprint — Anchor Gateway
# =============================================================================
# 免费套餐: 512MB RAM + 750h/月, 自动 HTTPS, 新加坡节点
# 注意: 单服务 ~744h/月, 在免费额度内; 仪表盘和 Worker 后续手动添加
# =============================================================================

services:
  - type: web
    name: anchor-gateway
    env: python
    region: singapore
    plan: free
    buildCommand: python3 -c "import feedback_store; feedback_store.init_db(); print('[OK] DB initialized')"
    startCommand: python3 awareness_gateway.py --port $PORT --mock
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ASYNC_AUDIT
        value: "0"
      - key: REDIS_NODES
        value: ""
    healthCheckPath: /health
    autoDeploy: true
