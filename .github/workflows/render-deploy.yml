name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Blueprint Sync
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -sSf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || \
            echo "::warning::Deploy hook call failed (hook may not be configured yet)"
      
      - name: Info — no deploy hook configured
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "::notice::No RENDER_DEPLOY_HOOK_URL secret set."
          echo "1) Go to https://dashboard.render.com"
          echo "2) Open your service → Settings → Deploy Hook"
          echo "3) Copy the URL → GitHub repo Settings → Secrets → Actions → RENDER_DEPLOY_HOOK_URL"
