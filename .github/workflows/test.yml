name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  waf-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: WAF 内存模式测试
        run: |
          python3 -c "
from waf import WAF

waf = WAF()

# 正常请求
r = waf.scan('Hello', ip='1.1.1.1', endpoint='/test', user_agent='Mozilla/5.0')
assert not r.blocked, f'正常请求被拦截: {r.reason}'
print('[PASS] 正常请求放行')

# SQL注入
r = waf.scan(\"'; DROP TABLE users; --\", ip='1.1.1.2', endpoint='/test', user_agent='Mozilla/5.0')
assert r.blocked and 'SQL' in r.reason, f'SQL注入未拦截: {r.reason}'
print('[PASS] SQL注入拦截')

# XSS
r = waf.scan('<script>alert(1)</script>', ip='1.1.1.3', endpoint='/test', user_agent='Mozilla/5.0')
assert r.blocked and 'XSS' in r.reason, f'XSS未拦截: {r.reason}'
print('[PASS] XSS拦截')

# 路径穿越
r = waf.scan('../../../etc/passwd', ip='1.1.1.4', endpoint='/test', user_agent='Mozilla/5.0')
assert r.blocked, f'路径穿越未拦截: {r.reason}'
print('[PASS] 路径穿越拦截')

# Bot UA
r = waf.scan('test', ip='1.1.1.5', endpoint='/test', user_agent='curl/8.0')
assert r.blocked and 'Bot' in r.reason, f'Bot UA未拦截: {r.reason}'
print('[PASS] Bot UA检测')

# SSRF
r = waf.check_ssrf('http://169.254.169.254/latest/meta-data/')
assert r.blocked, f'SSRF未拦截: {r.reason}'
print('[PASS] SSRF防护')

# Unicode攻击
r = waf.scan('hello\\u202Eworld', ip='1.1.1.6', endpoint='/test', user_agent='Mozilla/5.0')
assert r.blocked and 'Unicode' in r.reason, f'Unicode攻击未拦截: {r.reason}'
print('[PASS] Unicode攻击检测')

# Redis模式降级
waf_r = WAF(use_redis=True)
r = waf_r.scan('hello', ip='2.2.2.2', endpoint='/test', user_agent='Mozilla/5.0')
assert not r.blocked, f'Redis降级不应拦截: {r.reason}'
print('[PASS] Redis模式降级正常')

print()
print('========== 全部 WAF 测试通过 ==========')
"

  import-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 模块导入验证
        run: |
          python3 -c "
import sys
sys.path.insert(0, '.')

from waf import WAF, WAFResult
print('[OK] waf')

from waf_redis import RedisTokenBucket, RedisBlocklist
print('[OK] waf_redis')

from knowledge.redis_pool import get_redis, fact_key, ratelimit_key
print('[OK] knowledge.redis_pool')

from cluster.audit_callback import push_audit_task, AuditSubscriber
print('[OK] cluster.audit_callback')

import py_compile
py_compile.compile('cluster/audit_worker.py', doraise=True)
print('[OK] cluster.audit_worker (syntax)')

py_compile.compile('security_gateway.py', doraise=True)
print('[OK] security_gateway (syntax)')

py_compile.compile('awareness_gateway.py', doraise=True)
print('[OK] awareness_gateway (syntax)')

print()
print('========== 全部模块导入正常 ==========')
"
